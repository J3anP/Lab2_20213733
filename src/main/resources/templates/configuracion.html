<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>STF Games</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>

<div class="container-fluid">
    <p class="h1">STF GAMES: El juego de las minas explosivas</p>
    <form method="POST">
        <div class="container">
            <label>Número de filas:    </label>
            <input type="text" name="numfilas">
        </div>

        <div class="container">
            <label>Número de columnas: </label>
            <input type="text" name="numcolumnas">
        </div>


        <div class="container">
            <label>Número de intentos: </label>
            <input type="text" name="numintentos">
        </div>


        <div class="container">
            <label>Número de bombas:   </label>
            <input type="text" name="numbombas">
        </div>

        <div class="container">
            <label>Posiciones de las bombas</label>
            <input type="text" placeholder="(3,2) (4,6) (5,4) (6,2)">
        </div>

        <div class="col-12">
            <button class="btn btn-primary" type="submit" href="/jugar">Iniciar juego</button>
        </div>

    </form>
</div>
</body>
</html>
